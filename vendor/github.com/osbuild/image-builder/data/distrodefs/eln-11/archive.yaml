image_types:
  tar:
    filename: "root.tar.xz"
    mime_type: "application/x-tar"
    image_func: "tar"
    exports: ["archive"]
    package_sets:
      os:
        - include:
            - "policycoreutils"
            - "selinux-policy-targeted"
          exclude:
            - "rng-tools"
    platforms:
      - arch: "x86_64"
      - arch: "aarch64"
      - arch: "ppc64le"
      - arch: "s390x"
    blueprint:
      supported_options:
        # We've never tested many options or customizations with this image type
        # and we also never restricted any, but it uses the OS pipeline, so it
        # should support most standard/basic customizations
        - "distro"
        - "packages"
        - "modules"
        - "groups"
        - "containers"
        - "enabled_modules"
        - "customizations.cacerts"
        - "customizations.directories"
        - "customizations.dnf"
        - "customizations.files"
        - "customizations.firewall"
        - "customizations.user"
        - "customizations.sshkey"
        - "customizations.group"
        - "customizations.hostname"
        - "customizations.kernel.name"
        - "customizations.locale"
        - "customizations.repositories"
        - "customizations.rpm"
        - "customizations.services"
        - "customizations.timezone"
