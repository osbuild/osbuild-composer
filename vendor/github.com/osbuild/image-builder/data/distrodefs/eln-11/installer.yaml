            - "rsyslog"
            - "xfsprogs"
            - "dosfstools"
            - "device-mapper-persistent-data"
            - "xfsdump"
            - "udisks2"
            - "udisks2-iscsi"
            - "hostname"
            - "libblockdev-lvm-dbus"
            - "volume_key"
            - "nss-tools"
            - "selinux-policy-targeted"
            - "audit"
            - "ethtool"
            - "openssh-server"
            - "nfs-utils"
            - "openssh-clients"
            - "net-tools"
            - "ipcalc"
            - "nmap-ncat"
            - "prefixdevname"
            - "pciutils"
            - "usbutils"
            - "ipmitool"
            - "mt-st"
            - "smartmontools"
            - "hdparm"
            - "rdma-core"
            - "rng-tools"
            - "nvme-cli"
            - "default-fonts-core-sans"
            - "default-fonts-other-sans"
            - "google-noto-sans-cjk-fonts"
            - "gdb-gdbserver"
            - "python3-pyatspi"
            - "nano"
            - "vim-minimal"
            - "strace"
            - "lsof"
            - "xz"
            - "less"
            - "wget"
            - "rsync"
            - "bind-utils"
            # - "ftp"
            - "mtr"
            - "spice-vdagent"
            - "hexedit"
