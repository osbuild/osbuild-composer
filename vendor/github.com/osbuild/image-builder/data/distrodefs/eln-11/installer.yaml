.common:
  distro_build_pkgset: &distro_build_pkgset
    include:
      - "dnf"
      - "dosfstools"
      - "e2fsprogs"
      - "glibc"
      - "lvm2"
      - "policycoreutils"
      - "python3-iniparse"
      - "qemu-img"
      - "selinux-policy-targeted"
      - "systemd"
      - "tar"
      - "xfsprogs"
      - "xz"
    conditions:
      "x86_64 specific packages for build pkgsset":
        when:
          arch: "x86_64"
        append:
          include:
            - "grub2-pc"
      "ppc64le specific packages for build pkgsset":
        when:
          arch: "ppc64le"
        append:
          include:
            - "grub2-ppc64le"
            - "grub2-ppc64le-modules"

  installer_firmware_packages: &installer_firmware_packages
    - "amd-gpu-firmware"
    - "amd-ucode-firmware"
    - "atheros-firmware"
    - "brcmfmac-firmware"
    - "intel-gpu-firmware"
    - "iwlegacy-firmware"
    - "iwlwifi-dvm-firmware"
    - "iwlwifi-mvm-firmware"
    - "libertas-firmware"
    - "linux-firmware"
    - "mt7xxx-firmware"
    - "nvidia-gpu-firmware"
    - "nxpwireless-firmware"
    - "realtek-firmware"
    - "tiwilink-firmware"

  installer_platforms:
    x86_64_installer_platform: &x86_64_installer_platform
      <<: *x86_64_bios_platform
      image_format: "raw"
      fips_menu: true
      packages:
        <<: *x86_64_bios_platform_packages
        booting:
          - "biosdevname"
        firmware: *installer_firmware_packages
    aarch64_installer_platform: &aarch64_installer_platform
      <<: *aarch64_platform
      fips_menu: true
      packages:
        <<: *aarch64_uefi_platform_packages
        booting:
          - "grub2-efi-aa64-cdboot"
        firmware: *installer_firmware_packages
    ppc64le_installer_platform: &ppc64le_installer_platform
      <<: *ppc64le_bios_platform
      image_format: "qcow2"
      fips_menu: true
      packages:
        <<: *ppc64le_bios_platform_packages
        booting:
          - "lsvpd"
          - "ppc64-diag"
          - "grub2-tools"
          - "grub2-tools-minimal"
          - "grub2-tools-extra"
        firmware: *installer_firmware_packages
    s390x_installer_platform: &s390x_installer_platform
      arch: "s390x"
      image_format: "qcow2"
      qcow2_compat: "1.1"
      fips_menu: true
      packages:
        booting:
          - "dracut-config-generic"
          - "s390utils-base"
          - "s390utils-core"
      build_packages:
        booting:
          - "s390utils-base"
      bootloader: "zipl"

  default_iso_config: &default_iso_config
    rootfs_type: "erofs"
    erofs_options:
      compression:
        method: "lzma"
        level: 6
      options:
        - "fragments"
      cluster-size: 1048576
    conditions:
      "x86_64 uses grub2":
        when:
          arch: "x86_64"
        shallow_merge:
          boot_type: "grub2"
      "ppc64le uses grub2-ppc64le":
        when:
          arch: "ppc64le"
        shallow_merge:
          boot_type: "grub2-ppc64le"
      "s390x uses s390-iso":
        when:
          arch: "s390x"
        shallow_merge:
          boot_type: "s390-iso"

  default_installer_config: &default_installer_config
    enabled_anaconda_modules:
      - "org.fedoraproject.Anaconda.Modules.Network"
      - "org.fedoraproject.Anaconda.Modules.Payloads"
      - "org.fedoraproject.Anaconda.Modules.Runtime"
      - "org.fedoraproject.Anaconda.Modules.Storage"
    additional_dracut_modules:
      - "nvdimm"  # non-volatile DIMM firmware (provides nfit, cuse, and nd_e820)
      - "net-lib"
    additional_drivers:
      - "ipmi_devintf"
      - "ipmi_msghandler"
    default_menu: 1
    lorax_template_package: lorax-templates-rhel
    lorax_templates:
      - path: 80-rhel/runtime-postinstall.tmpl
      - path: 80-rhel/runtime-cleanup.tmpl
        after_dracut: true
    lorax_logos_package: redhat-logos
    lorax_release_package: redhat-release
    install_weak_deps: true

  anaconda_boot_pkgset: &anaconda_boot_pkgset
    conditions:
      "x86 specific packages for the anaconda boot pkgset":
        when:
          arch: "x86_64"
        append:
          include:
            # eficommon
            - "efibootmgr"
            # XXX: de-dup?
            # grub-common
            - "grub2-tools"
            - "grub2-tools-extra"
            - "grub2-tools-minimal"
            # arch specific
            - "grub2-efi-x64"
            - "grub2-efi-x64-cdboot"
            - "grub2-pc"
            - "grub2-pc-modules"
            - "shim-x64"
            - "syslinux"
            - "syslinux-nonlinux"
      "aarch64 specific packages for the anaconda boot pkgset":
        when:
          arch: "aarch64"
        append:
          include:
            # eficommon
            - "efibootmgr"
            # XXX: de-dup?
            # grub-common
            - "grub2-tools"
            - "grub2-tools-extra"
            - "grub2-tools-minimal"
            # arch specific
            - "grub2-efi-aa64-cdboot"
            - "grub2-efi-aa64"
            - "shim-aa64"

  installer_pkgset: &installer_pkgset
    include:
      - "anaconda-dracut"
      - "curl"
      - "dracut-config-generic"
      - "dracut-network"
      - "hostname"
      - "iwlegacy-firmware"
      - "iwlwifi-dvm-firmware"
      - "iwlwifi-mvm-firmware"
      - "kernel"
      - "less"
      - "nfs-utils"
      - "openssh-clients"
      - "ostree"
      - "plymouth"
      - "prefixdevname"
      - "rng-tools"
      - "rpcbind"
      - "selinux-policy-targeted"
      - "systemd"
      - "tar"
      - "xfsprogs"
      - "xz"
      # Extra packages that are required by the dracut stage of all installers.
      # These are weak deps of other packages in the list above, but lets be
      # explicit about what we need and not rely on the weak deps. Relying
      # on hard-dependencies for other modules is OK for now.
      #
      # TODO: add these dynamically based on the modules enabled by each
      # pipeline.
      - "mdadm"
      - "nss-softokn"

image_types:
  "network-installer":
    filename: "netinst.iso"
    mime_type: "application/x-iso9660-image"
    bootable: true
    boot_iso: true
    image_func: "network-installer"
    # We don't know the variant of the OS pipeline being installed
    iso_label: "Unknown"
    exports: ["bootiso"]
    required_partition_sizes: *default_required_dir_sizes
    installer_config: *default_installer_config
    iso_config: *default_iso_config
    image_config:
      locale: "en_US.UTF-8"
    platforms:
      - *x86_64_installer_platform
      - *aarch64_installer_platform
      - *ppc64le_installer_platform
      - *s390x_installer_platform
    package_sets:
      installer:
        - include:
            - "anaconda"
            - "anaconda-widgets"
            - "kdump-anaconda-addon"
            - "anaconda-install-img-deps"
            # - "redhat-release-eula"
            - "device-mapper-multipath"
            - "dnf"
            - "rpm-ostree"
            - "ostree"
            - "pigz"
            - "kernel"
            - "kernel-modules"
            - "kernel-modules-extra"
            - "grubby"
            - "glibc-all-langpacks"
            - "plymouth"
            - "anaconda-dracut"
            - "dracut-network"
            - "dracut-config-generic"
            - "initscripts"
            - "cryptsetup"
            - "rpcbind"
            - "kbd"
            - "kbd-misc"
            - "tar"
            - "xz"
            - "curl"
            - "bzip2"
