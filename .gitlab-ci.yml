stages:
  - init
  - rpmbuild
  - prepare-rhel-internal
  - test
  - finish

.base:
  before_script:
    - mkdir -p /tmp/artifacts
    - schutzbot/ci_details.sh > /tmp/artifacts/ci-details-before-run.txt
    - cat schutzbot/team_ssh_keys.txt | tee -a ~/.ssh/authorized_keys > /dev/null
    # workaround bug https://issues.redhat.com/browse/RHEL-17890
    - sudo dnf upgrade -y nettle
  after_script:
    - schutzbot/ci_details.sh > /tmp/artifacts/ci-details-after-run.txt || true
    - schutzbot/unregister.sh || true
    - schutzbot/update_github_status.sh update || true
    - schutzbot/save_journal.sh || true
    - schutzbot/upload_artifacts.sh
  interruptible: true
  retry: 1
  tags:
    - terraform
  artifacts:
    paths:
      - "*.repo"
      - COMPOSER_NVR
    when: always

.terraform:
  extends: .base
  tags:
    - terraform

.terraform/openstack:
  extends: .base
  tags:
    - terraform/openstack

.terraform/gcp:
  extends: .base
  tags:
    - terraform/gcp


init:
  stage: init
  interruptible: true
  tags:
    - shell
  script:
    - schutzbot/update_github_status.sh start

.build_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule" && $SKIP_CI == "false"'
    - if: '$CI_PIPELINE_SOURCE != "schedule" && $SKIP_CI == "true"'
      when: manual

.upstream_and_ga_rules_all:
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule" && $RUNNER'

.upstream_and_ga_rules_x86_64:
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule" && $RUNNER =~ "/^.*(x86_64).*$/"'

.RPM_RUNNERS_RHEL: &RPM_RUNNERS_RHEL
  RUNNER:
    - aws/rhel-9.5-ga-x86_64
    - aws/rhel-9.5-ga-aarch64

  INTERNAL_NETWORK: ["true"]

RPM:
  stage: rpmbuild
  extends: .terraform
  rules:
    - !reference [.build_rules, rules]
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - sh "schutzbot/mockbuild.sh"
  parallel:
    matrix:
      - <<: *RPM_RUNNERS_RHEL

Base:
  stage: test
  extends: .terraform
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/base_tests.sh
  parallel:
    matrix:
      - <<: *RPM_RUNNERS_RHEL

.regression:
  stage: test
  extends: .terraform
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/${SCRIPT}
  parallel:
    matrix:
      - <<: *RPM_RUNNERS_RHEL

regression-excluded-dependency:
  extends: .regression
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  variables:
    SCRIPT: regression-excluded-dependency.sh

regression-include-excluded-packages:
  extends: .regression
  rules: 
    - !reference [.upstream_and_ga_rules_all, rules]
  variables:
    SCRIPT: regression-include-excluded-packages.sh

regression-insecure-repo:
  extends: .regression
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  variables:
    SCRIPT: regression-insecure-repo.sh


regression-no-explicit-rootfs-definition:
  extends: .regression
  rules: 
    - !reference [.upstream_and_ga_rules_all, rules]
  variables:
    SCRIPT: regression-no-explicit-rootfs-definition.sh

Image Tests:
  stage: test
  extends: .terraform
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/image_tests.sh
  parallel:
    matrix:
      - <<: *RPM_RUNNERS_RHEL

Trigger-rhel-edge-ci:
  rules:
    - if: '$CI_PIPELINE_SOURCE != "schedule"'
  stage: test
  interruptible: true
  tags:
    - shell
  script:
    - 'curl -u "${SCHUTZBOT_LOGIN}" -X POST -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/osbuild/rhel-edge-ci/dispatches -d "{\"event_type\":\"osbuild-composer-ci\",\"client_payload\":{\"pr_number\":\"${CI_COMMIT_BRANCH}\"}}"'

.integration_base:
  stage: test
  extends: .terraform
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/${SCRIPT}

.rhel_runners: &rhel_runners
    RUNNER:
      - aws/rhel-9.5-ga-x86_64
    INTERNAL_NETWORK: ["true"]

.integration_rhel:
  extends: .integration_base
  parallel:
    matrix:
      - *rhel_runners

.integration:
  extends: .integration_base
  parallel:
    matrix:
      - *rhel_runners

aws.sh:
  extends: .integration
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  variables:
    SCRIPT: aws.sh

oci.sh:
  extends: .integration
  rules:
    # Run only on x86_64
    - !reference [.upstream_and_ga_rules_x86_64, rules]
  variables:
    SCRIPT: oci.sh

OpenShift_Virtualization:
  extends: .integration_rhel
  rules:
    - !reference [.upstream_and_ga_rules_x86_64, rules]
  variables:
    SCRIPT: openshift_virtualization.sh

azure.sh:
  extends: .integration
  rules:
    # Run only on x86_64
    - !reference [.upstream_and_ga_rules_x86_64, rules]
  variables:
    SCRIPT: azure.sh

azure.sh_hyperv_gen2:
  extends: .integration
  rules:
    # Run only on x86_64
    - !reference [.upstream_and_ga_rules_x86_64, rules]
  variables:
    SCRIPT: azure_hyperv_gen2.sh

gcp.sh:
  extends: .integration_rhel
  rules:
    - !reference [.upstream_and_ga_rules_x86_64, rules]
  variables:
    SCRIPT: gcp.sh

vmware.sh_vmdk:
  extends: .integration_rhel
  rules:
    # Run only on x86_64
    - !reference [.upstream_and_ga_rules_x86_64, rules]
  variables:
    SCRIPT: vmware.sh vmdk

vmware.sh_ova:
  extends: .integration_rhel
  rules:
    # Run only on x86_64
    - !reference [.upstream_and_ga_rules_x86_64, rules]
  variables:
    SCRIPT: vmware.sh ova

filesystem.sh:
  extends: .integration
  parallel:
    matrix:
    - *rhel_runners

  variables:
    SCRIPT: filesystem.sh

cross-distro.sh:
  extends: .integration
  variables:
    SCRIPT: cross-distro.sh

.API_TESTS: &API_TESTS
  IMAGE_TYPE:
    - aws
    - azure
    - edge-commit
    - gcp
    - vsphere
    - edge-commit generic.s3
    - edge-container
    - oci

.libvirt_integration:
  stage: test
  extends: .terraform/gcp
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/${SCRIPT}
  parallel:
    matrix:
      - RUNNER:
          - gcp/rhel-9.5-ga-x86_64
        INTERNAL_NETWORK: ["true"]

libvirt.sh:
  extends: .libvirt_integration
  variables:
    SCRIPT: libvirt.sh

ubi-wsl.sh:
  stage: test
  extends: .terraform
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/ubi-wsl.sh
  parallel:
    matrix:
      - RUNNER:
          - aws/rhel-9.5-ga-x86_64
        INTERNAL_NETWORK: "true"

weldr-distro-dot-notation+aliases:
  stage: test
  extends: .terraform
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/weldr-distro-dot-notation-and-aliases.sh
  parallel:
    matrix:
      - RUNNER:
          - aws/rhel-9.5-ga-x86_64
        INTERNAL_NETWORK: ["true"]

.generic_s3:
  extends: .libvirt_integration
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]

generic_s3_http.sh:
  extends: .generic_s3
  variables:
    SCRIPT: generic_s3_http.sh

generic_s3_https_secure.sh:
  extends: .generic_s3
  variables:
    SCRIPT: generic_s3_https_secure.sh

generic_s3_https_insecure.sh:
  extends: .generic_s3
  variables:
    SCRIPT: generic_s3_https_insecure.sh

aws_s3.sh:
  extends: .generic_s3
  variables:
    SCRIPT: aws_s3.sh

NIGHTLY_FAIL:
  stage: finish
  tags:
    - shell
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY == "true"'
      when: on_failure
  script:
    - schutzbot/slack_notification.sh FAILED ":big-sad:" nightly

NIGHTLY_SUCCESS:
  stage: finish
  tags:
    - shell
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY == "true"'
  script:
    - schutzbot/slack_notification.sh SUCCESS ":partymeow:" nightly

GA_FAIL:
  stage: finish
  tags:
    - shell
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY== "false"'
      when: on_failure
  script:
    - schutzbot/slack_notification.sh FAILED ":big-sad:" ga

GA_SUCCESS:
  stage: finish
  tags:
    - shell
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $NIGHTLY== "false"'
  script:
    - schutzbot/slack_notification.sh SUCCESS ":partymeow:" ga

Installer:
  stage: test
  extends: .terraform/openstack
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/installers.sh
  parallel:
    matrix:
      - RUNNER:
          - rhos-01/rhel-9.5-ga-x86_64

ContainerEmbedding:
  stage: test
  extends: .terraform
  rules:
    - !reference [.upstream_and_ga_rules_all, rules]
  script:
    - schutzbot/deploy.sh
    - /usr/libexec/tests/osbuild-composer/container-embedding.sh
  parallel:
    matrix:
      - INTERNAL_NETWORK: "true"
        RUNNER:
        - aws/rhel-9.5-ga-x86_64

finish:
  stage: finish
  dependencies: []
  tags:
    - shell
  script:
    - schutzbot/update_github_status.sh finish
